<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OpenClaw · 开物</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<style>
/* ══════════════════════════════════════════════
   Design tokens — supports light / dark
   ══════════════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg-deep: #08080c;
  --bg-surface: #111118;
  --bg-card: #16161e;
  --bg-card-hover: #1c1c28;
  --bg-input: #0c0c14;
  --border-dim: #1e1e2c;
  --border-active: #e63f52;
  --text-primary: #f0edf2;
  --text-secondary: #8b8891;
  --text-muted: #56535c;
  --accent: #e63f52;
  --accent-warm: #f97316;
  --accent-gradient: linear-gradient(135deg, #e63f52 0%, #f97316 100%);
  --green: #48bb78;
  --green-bg: rgba(72,187,120,.1);
  --yellow: #f59e0b;
  --red: #f56565;
  --radial-red: rgba(230,63,82,.04);
  --radial-orange: rgba(249,115,22,.03);
  --surface-alpha: rgba(255,255,255,.015);
  --surface-alpha2: rgba(255,255,255,.02);
  --surface-alpha4: rgba(255,255,255,.04);
  --badge-bg-red: rgba(230,63,82,.12);
  --badge-border-red: rgba(230,63,82,.2);
  --badge-bg-green: rgba(72,187,120,.1);
  --badge-border-green: rgba(72,187,120,.15);
  --badge-bg-purple: rgba(167,139,250,.1);
  --badge-border-purple: rgba(167,139,250,.15);
  --badge-bg-yellow: rgba(251,191,36,.1);
  --badge-border-yellow: rgba(251,191,36,.15);
  --badge-bg-blue: rgba(96,165,250,.1);
  --badge-border-blue: rgba(96,165,250,.15);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 24px rgba(0,0,0,.25);
  --shadow-glow: 0 0 40px rgba(230,63,82,.08);
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "Cascadia Code", ui-monospace, SFMono-Regular, monospace;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

[data-theme="light"] {
  --bg-deep: #f8f9fb;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f6f8;
  --bg-input: #f0f1f5;
  --border-dim: #e2e4ea;
  --border-active: #e63f52;
  --text-primary: #1a1c26;
  --text-secondary: #5b5d6e;
  --text-muted: #9a9db0;
  --accent: #d43a4c;
  --accent-warm: #e86520;
  --accent-gradient: linear-gradient(135deg, #e63f52 0%, #f97316 100%);
  --green: #2ea85a;
  --green-bg: rgba(46,168,90,.08);
  --yellow: #c27a0a;
  --red: #dc3545;
  --radial-red: rgba(230,63,82,.03);
  --radial-orange: rgba(249,115,22,.02);
  --surface-alpha: rgba(0,0,0,.02);
  --surface-alpha2: rgba(0,0,0,.025);
  --surface-alpha4: rgba(0,0,0,.04);
  --badge-bg-red: rgba(230,63,82,.08);
  --badge-border-red: rgba(230,63,82,.18);
  --badge-bg-green: rgba(46,168,90,.08);
  --badge-border-green: rgba(46,168,90,.15);
  --badge-bg-purple: rgba(139,92,246,.08);
  --badge-border-purple: rgba(139,92,246,.15);
  --badge-bg-yellow: rgba(202,138,4,.08);
  --badge-border-yellow: rgba(202,138,4,.15);
  --badge-bg-blue: rgba(37,99,235,.08);
  --badge-border-blue: rgba(37,99,235,.15);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 24px rgba(0,0,0,.08);
  --shadow-glow: 0 0 40px rgba(230,63,82,.06);
}

* { margin:0; padding:0; box-sizing:border-box }

html { background: var(--bg-deep) }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══ Ornamental gradient — subtle atmosphere ═══ */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -20%;
  width: 80%;
  height: 140%;
  background: radial-gradient(ellipse at 30% 30%, var(--radial-red) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  top: 20%;
  right: -30%;
  width: 70%;
  height: 80%;
  background: radial-gradient(ellipse at 60% 50%, var(--radial-orange) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 940px; margin: 0 auto; padding: 56px 28px 96px; position: relative; z-index: 1 }

/* ═══ HEADER — editorial ═══ */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}
.logo-section h1 {
  font-size: 2.25em;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -1px;
  line-height: 1.1;
}
.logo-section h1 span {
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-section p {
  color: var(--text-muted);
  font-size: .88em;
  margin-top: 6px;
  font-weight: 450;
  letter-spacing: .3px;
}
.header-actions { display: flex; gap: 8px; padding-top: 4px }

/* ═══ STATUS PILL — glass morphic ═══ */
.status-pill-wrap { margin-bottom: 40px }
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  transition: all .3s var(--ease-out);
  min-height: 52px;
}
.status-pill.online {
  border-color: rgba(72,187,120,.3);
  box-shadow: 0 0 24px rgba(72,187,120,.06);
}
.status-pill.offline {
  border-color: rgba(245,101,101,.25);
}
.status-pill.loading-state {
  border-color: rgba(245,158,11,.25);
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.green {
  background: var(--green);
  box-shadow: 0 0 14px rgba(72,187,120,.5);
}
.status-dot.red { background: var(--red) }
.status-dot.orange {
  background: transparent;
  border: 2.5px solid var(--yellow);
  border-top-color: transparent;
  animation: dotSpin .8s linear infinite;
}
@keyframes dotSpin { to { transform: rotate(360deg) } }

.status-label {
  font-size: .95em;
  font-weight: 550;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

/* ═══ BUTTONS ═══ */
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px;
  background: var(--accent-gradient);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: .85em; font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s var(--ease-out);
  box-shadow: 0 2px 12px rgba(230,63,82,.2);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(230,63,82,.3);
}

.btn-ghost {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  font-size: .82em; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .15s var(--ease-out);
  font-family: var(--font-sans);
}
.btn-ghost:hover {
  background: var(--bg-card);
  border-color: #2c2c3c;
  color: var(--text-primary);
}

.btn-dashboard {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px;
  background: var(--accent-gradient);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: .85em; font-weight: 600;
  text-decoration: none;
  box-shadow: 0 2px 14px rgba(230,63,82,.18);
  transition: all .2s var(--ease-out);
}
.btn-dashboard:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(230,63,82,.3) }

/* ═══ SECTIONS ═══ */
.section { display: none }
.section.active { display: block }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.section-header h2 {
  font-size: 1.15em;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.3px;
}
.section-desc {
  color: var(--text-muted);
  font-size: .88em;
  margin-bottom: 28px;
  line-height: 1.6;
  max-width: 560px;
}

/* ═══ CARD GRID — bento-inspired ═══ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
  gap: 14px;
  margin-bottom: 36px;
}

/* ═══ FEATURE CARD ═══ */
.feature-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  transition: all .25s var(--ease-out);
  position: relative;
}
/* Subtle top-edge glow on hover */
.feature-card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%; height: 1px;
  background: transparent;
  transition: all .3s var(--ease-out);
  z-index: 2;
}
.feature-card:hover {
  background: var(--bg-card-hover);
  border-color: #2a2a3c;
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.feature-card:hover::before {
  background: linear-gradient(90deg, transparent, rgba(230,63,82,.3), transparent);
  left: 10%; right: 10%;
}
.feature-card.selected {
  border-color: var(--border-active);
  box-shadow: var(--shadow-glow);
}
.feature-card.selected::before {
  background: linear-gradient(90deg, transparent, rgba(230,63,82,.4), transparent);
  left: 5%; right: 5%;
}

.card-face { padding: 18px 20px }
.card-face h4 {
  font-size: .98em;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-face p {
  font-size: .82em;
  color: var(--text-muted);
  line-height: 1.5;
}

/* ═══ BADGES ═══ */
.badge {
  font-size: .68em;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: .4px;
  text-transform: uppercase;
}
.badge-hot  { background: var(--badge-bg-red);  color: #f87171; border: 1px solid var(--badge-border-red) }
.badge-free { background: var(--badge-bg-green);   color: #4ade80; border: 1px solid var(--badge-border-green) }
.badge-fast { background: var(--badge-bg-purple);  color: #a78bfa; border: 1px solid var(--badge-border-purple) }
.badge-cheap{ background: var(--badge-bg-yellow);   color: #fbbf24; border: 1px solid var(--badge-border-yellow) }
.badge-cn   { background: var(--badge-bg-blue);   color: #60a5fa; border: 1px solid var(--badge-border-blue) }

.configured-dot {
  background: rgba(72,187,120,.12);
  color: var(--green);
  border: 1px solid rgba(72,187,120,.2);
  font-size: .68em;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 600;
  margin-left: auto;
}

/* ═══ EXPAND FORM ═══ */
.expand-form {
  max-height: 0;
  padding: 0 20px;
  opacity: 0;
  overflow: hidden;
  transition: all .35s var(--ease-out);
  background: var(--surface-alpha);
  border-top: 1px solid transparent;
}
.feature-card.selected .expand-form {
  max-height: 640px;
  padding: 18px 20px;
  opacity: 1;
  border-top-color: var(--border-dim);
}

/* ═══ FORM ELEMENTS ═══ */
.form-row { margin-bottom: 15px }
.form-row label {
  display: flex;
  justify-content: space-between;
  color: var(--text-secondary);
  margin-bottom: 7px;
  font-size: .82em;
  font-weight: 550;
  letter-spacing: .2px;
}
.form-row input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1.5px solid var(--border-dim);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: .88em;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-row input::placeholder { color: var(--text-muted) }
.form-row input:focus {
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px rgba(230,63,82,.08);
}
.ext-link {
  color: var(--accent);
  text-decoration: none;
  font-size: .82em;
  font-weight: 600;
  display: inline-block;
  margin-bottom: 12px;
  transition: color .15s;
}
.ext-link:hover { color: var(--accent-warm) }

/* ═══ ACTION BUTTONS in forms ═══ */
.action-btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: .88em;
  font-weight: 650;
  cursor: pointer;
  transition: all .2s var(--ease-out);
  margin-top: 4px;
  font-family: var(--font-sans);
}
.action-btn.primary {
  background: var(--accent-gradient);
  color: #fff;
  box-shadow: 0 2px 12px rgba(230,63,82,.18);
}
.action-btn.primary:hover { box-shadow: 0 4px 20px rgba(230,63,82,.28) }
.action-btn.secondary {
  background: transparent;
  color: var(--text-secondary);
  border: 1.5px solid var(--border-dim);
}
.action-btn.secondary:hover { background: var(--bg-card); color: var(--text-primary) }

.plugin-status { font-size: .82em; margin-top: 8px; display: none }

/* ═══ DONE STEP ═══ */
.result-block { text-align: center; padding: 36px 0 }
.result-block h2 {
  color: var(--green);
  font-size: 1.5em;
  margin-bottom: 8px;
  font-weight: 700;
}
.result-block p { color: var(--text-muted); font-size: .9em }
.result-block .url-box {
  display: inline-block;
  background: var(--bg-input);
  border: 1.5px solid var(--border-dim);
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: .95em;
  margin: 18px 0;
  font-weight: 550;
}

/* ═══ NO GATEWAY STATE ═══ */
#stepNoGateway h2 { color: var(--text-primary); margin-bottom: 12px }
#stepNoGateway p { color: var(--text-muted); margin-bottom: 16px }
#stepNoGateway pre {
  background: var(--bg-input);
  color: var(--green);
  padding: 14px 22px;
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: .88em;
  display: inline-block;
  border: 1px solid var(--border-dim);
}

/* ═══ LOG PANEL ═══ */
.log-panel {
  margin-top: 48px;
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.log-panel-header {
  padding: 11px 18px;
  background: var(--surface-alpha2);
  font-size: .85em;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
}
.log-panel-header:hover { background: var(--surface-alpha4) }
.log-viewer {
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: .78em;
  color: var(--text-muted);
  height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  line-height: 1.55;
  scroll-behavior: smooth;
  display: none;
  background: var(--bg-deep);
  border-top: 1px solid var(--border-dim);
}
.log-viewer::-webkit-scrollbar { width: 6px }
.log-viewer::-webkit-scrollbar-track { background: transparent }
.log-viewer::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px }

/* ═══ FOOTER ═══ */
.footer-bar {
  text-align: center;
  margin-top: 48px;
  font-size: .82em;
  color: var(--text-muted);
}
.footer-bar a {
  color: var(--text-muted);
  text-decoration: none;
  cursor: pointer;
  margin: 0 12px;
  transition: color .15s;
}
.footer-bar a:hover { color: var(--accent) }

/* ═══ TOAST ═══ */
.toast {
  position: fixed;
  top: 24px; right: 24px;
  padding: 13px 22px;
  border-radius: var(--radius-sm);
  font-size: .88em;
  opacity: 0;
  transform: translateY(-10px);
  transition: all .3s var(--ease-out);
  z-index: 999;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  background: var(--green);
  color: #fff;
}
.toast.show { opacity: 1; transform: translateY(0) }
.toast.error { background: var(--red) }

/* ═══ MODALS ═══ */
.modal-shroud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s var(--ease-out);
}
.modal-shroud.show { opacity: 1; pointer-events: auto }
.modal-box {
  background: var(--bg-surface);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 540px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  padding: 32px;
  box-shadow: 0 24px 80px rgba(0,0,0,.4);
}
.modal-box h3 {
  font-size: 1.15em;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text-primary);
  text-align: center;
  letter-spacing: -.2px;
}
.modal-box .modal-body {
  color: var(--text-secondary);
  font-size: .88em;
  line-height: 1.7;
  overflow-y: auto;
}
.modal-box .modal-foot { margin-top: 24px; text-align: center }

/* ═══ QR wrapper ═══ */
.qr-wrapper { text-align: center; padding: 14px 0 }
.qr-wrapper p { font-size: .82em; color: var(--text-muted); margin-top: 8px }

/* ═══ Responsive ═══ */
@media (max-width: 640px) {
  .container { padding: 36px 16px 64px }
  .header-bar { flex-direction: column; gap: 16px }
  .logo-section h1 { font-size: 1.7em }
  .card-grid { grid-template-columns: 1fr }
  .status-label { font-size: .85em }
}
</style>
</head>
<body>
<div class="container">

<!-- ═══ HEADER ═══ -->
<header class="header-bar">
  <div class="logo-section">
    <h1>开物<span>· 设置向导</span></h1>
    <p>AI 模型接入 · 聊天通道绑定 · 开箱即用</p>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" id="themeToggle" onclick="toggleTheme()" title="切换深浅主题">☀</button>
    <button class="btn-ghost" id="headerUpdateBtn" style="display:none" onclick="openVersionModal()">更新 v??</button>
    <button class="btn-ghost" onclick="openTerminalModal()">命令行</button>
  </div>
</header>

<!-- ═══ STATUS ═══ -->
<div class="status-pill-wrap">
  <div class="status-pill loading-state" id="statusPill">
    <div class="status-dot orange" id="statusDot"></div>
    <div class="status-label" id="statusText">检测中…</div>
  </div>
</div>

<!-- ═══ NO GATEWAY ═══ -->
<div class="section" id="stepNoGateway" style="display:none;text-align:center;padding:40px 0">
  <h2>Gateway 未启动</h2>
  <p>请先启动网关服务</p>
  <pre>./openclaw gateway run</pre>
  <button class="action-btn primary" style="display:inline-block;width:auto;margin-top:16px" onclick="startGateway()">自动启动</button>
</div>

<!-- ═══ MODEL SETUP ═══ -->
<div class="section active" id="stepSetup">
  <div class="section-header">
    <h2>模型配置</h2>
    <button class="btn-primary" style="padding:7px 15px;font-size:.82em" onclick="skipToChannels()">接入聊天应用 →</button>
  </div>
  <p class="section-desc">选择一个模型并填入 API Key 即可开始使用。也可在 Gateway 控制台中完成设置。</p>
  <div class="card-grid" id="modelGrid"></div>
</div>

<!-- ═══ DONE / CHANNELS ═══ -->
<div class="section" id="stepDone">
  <div class="result-block">
    <div id="saveSuccessMsg">
      <h2>配置已保存</h2>
      <p>Gateway 启动后即可访问 Dashboard 控制台</p>
      <div class="url-box" id="dashboardUrlText">http://127.0.0.1:18789</div>
    </div>
    <div style="margin-top:44px">

// ── QR-based channel connect (WeChat) ──
async function connectChannelQR(channelId, npmSpec, btn) {
  var statusEl = btn.parentElement.querySelector('.plugin-status');
  statusEl.style.display = 'block';
  statusEl.style.color = '#f59e0b';
  btn.disabled = true;
  btn.textContent = '检测中…';

  try {
    statusEl.textContent = '正在获取二维码…';
    var lr = await fetch('/api/channels/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({channel: channelId, npm: npmSpec})
    });
    var ld = await lr.json();

    if (ld.ok && ld.qrUrl) {
      statusEl.innerHTML = '<div style="text-align:center" id="qr-wrap-' + channelId + '">'
        + '<p style="color:#4ade80;font-weight:bold;margin-bottom:10px">请用手机扫描二维码</p>'
        + '<div id="qr-' + channelId + '" style="display:inline-block;background:#fff;padding:8px;border-radius:8px"></div>'
        + '<p class="qr-status-text" style="color:var(--text-muted);font-size:.8em;margin-top:8px">扫码后在手机上确认授权</p>'
        + '</div>';
      btn.textContent = '刷新二维码';
      showToast('请扫描二维码');
      setTimeout(function() { renderQR(channelId, ld.qrUrl); }, 200);
      var qrcode = ld.qrcode;
      var pollTimer = setInterval(async function() {
        try {
          var sr = await fetch('/api/channels/login-status?qrcode=' + encodeURIComponent(qrcode));
          var sd = await sr.json();
          var statusText = statusEl.querySelector('.qr-status-text');
          if (sd.status === 'confirmed') {
            clearInterval(pollTimer);
            if (statusText) { statusText.style.color = '#4ade80'; statusText.textContent = '✅ ' + sd.message; }
            statusEl.querySelector('#qr-wrap-' + channelId).style.opacity = '0.5';
            btn.textContent = '已完成';
            btn.disabled = false;
            showToast('✅ 微信已绑定成功');
            var channelCard = btn.closest('.channel-card');
            var header = channelCard.querySelector('.card-face h4');
            if (header && !header.querySelector('.btn-unbind')) {
              header.insertAdjacentHTML('afterbegin', '<button class="btn-ghost btn-unbind" style="padding:2px 8px;font-size:.72em;margin-right:6px" onclick="event.stopPropagation();unbindChannel(\'openclaw-weixin\',this)">换绑</button>');
            }
          } else if (sd.status === 'expired') {
            clearInterval(pollTimer);
            if (statusText) { statusText.style.color = '#f56565'; statusText.textContent = '二维码已过期，请点击刷新'; }
            btn.textContent = '刷新二维码';
            btn.disabled = false;
          } else if (sd.status === 'scaned' || sd.status === 'scaned_but_redirect') {
            if (statusText) { statusText.style.color = '#f59e0b'; statusText.textContent = '已扫码，请在手机上确认授权…'; }
          }
        } catch(e) {}
      }, 2000);
      btn._pollTimer = pollTimer;
    } else if (ld.ok) {
      statusEl.style.color = '#4ade80';
      statusEl.textContent = '✅ ' + ld.message;
      btn.textContent = '已完成';
    } else {
      throw new Error(ld.error || '获取二维码失败');
    }
  } catch(e) {
    statusEl.style.color = '#f56565';
    statusEl.textContent = '❌ ' + (e instanceof Error ? e.message : String(e));
    btn.textContent = '重试';
  } finally { btn.disabled = false; }
}

function renderQR(channelId, url) {
  function tryIt() {
    var el = document.getElementById('qr-' + channelId);
    if (el && typeof QRCode !== 'undefined') {
      el.innerHTML = '';
      new QRCode(el, {text: url, width: 200, height: 200,
        colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M});
      return true;
    }
    return false;
  }
  if (!tryIt()) {
    var retries = 0;
    var timer = setInterval(function() { if (tryIt() || ++retries >= 30) clearInterval(timer); }, 300);
  }
}

// ── Channel connect helpers ──
async function connectChannelQQ(channelId, npmSpec, btn) { channelTokenSetup(channelId, npmSpec, btn, 'qqbot'); }
async function connectChannelDingTalk(channelId, npmSpec, btn) { channelTokenSetup(channelId, npmSpec, btn, 'dingtalk'); }
async function connectChannelFeishu(channelId, npmSpec, btn) { channelTokenSetup(channelId, npmSpec, btn, 'feishu'); }

async function channelTokenSetup(channelId, npmSpec, btn, endpoint) {
  var card = btn.closest('.channel-card');
  var statusEl = btn.parentElement.querySelector('.plugin-status');
  var appId = (card.querySelector('.inp-appid') || {}).value || '';
  var appSecret = (card.querySelector('.inp-appsecret') || {}).value || '';

  if (!appId || !appSecret) {
    statusEl.style.display = 'block';
    statusEl.style.color = '#f56565';
    statusEl.textContent = '请填写 App ID 和 App Secret';
    return;
  }

  statusEl.style.display = 'block';
  statusEl.style.color = '#f59e0b';
  btn.disabled = true;
  btn.textContent = '配置中…';
  statusEl.textContent = '正在保存…';

  try {
    var r = await fetch('/api/channels/' + endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({channel: channelId, npm: npmSpec, appId: appId, appSecret: appSecret})
    });
    var d = await r.json();
    if (d.ok) {
      statusEl.style.color = '#4ade80';
      statusEl.textContent = '✅ ' + (d.message || '已保存，重启 Gateway 后生效');
      btn.textContent = '已完成';
      showToast('✅ ' + channelId + ' 已配置');
    } else {
      throw new Error(d.error || '保存失败');
    }
  } catch(e) {
    statusEl.style.color = '#f56565';
    statusEl.textContent = '❌ ' + (e instanceof Error ? e.message : String(e));
    btn.textContent = '重试';
    btn.disabled = false;
  }
}

function toggleModel(el) {
  el.classList.toggle('selected');
  document.querySelectorAll('.feature-card[data-provider]').forEach(c => { if(c!==el) c.classList.remove('selected') });
}
function toggleChannel(el) {
  el.classList.toggle('selected');
  document.querySelectorAll('.channel-card').forEach(c => { if(c!==el) c.classList.remove('selected') });
}

async function saveModelConfig(provider, btn) {
  const card = btn.closest('.feature-card');
  const baseUrl = card.querySelector('.inp-base').value;
  const model = card.querySelector('.inp-model').value;
  const apiKey = card.querySelector('.inp-key').value;
  if(!apiKey) { showToast('请填写 API Key', true); return; }

  try {
    btn.disabled = true; btn.textContent = '保存中…';
    let cfg;
    try { const r = await fetch('/api/config'); cfg = await r.json(); } catch(e) { cfg = {}; }

    if (!cfg.agents) cfg.agents = {};
    if (!cfg.agents.defaults) cfg.agents.defaults = {};
    if (!cfg.agents.defaults.model) cfg.agents.defaults.model = {};
    cfg.agents.defaults.model.primary = model;

    if (!cfg.gateway) cfg.gateway = {};
    if (!cfg.gateway.auth) cfg.gateway.auth = {mode:'none'};
    cfg.gateway.mode = 'local';

    if (!cfg.models) cfg.models = {mode:'merge',providers:{}};
    if (!cfg.models.providers) cfg.models.providers = {};
    cfg.models.providers[provider] = {
      api: 'openai-completions',
      apiKey: apiKey,
      baseUrl: baseUrl,
      models: [{
        id: model, input: ['text'], maxTokens: 8192, name: model, reasoning: false,
        contextWindow: 128000,
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      }]
    };

    await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
    config = cfg;
    showToast('配置已保存');
    card.querySelector('.card-face h4').insertAdjacentHTML('beforeend','<span class="configured-dot">已配置</span>');
    document.getElementById('stepSetup').classList.remove('active');
    document.getElementById('stepDone').classList.add('active');
    loadChannels();
  } catch(e) {
    showToast('保存失败: ' + (e instanceof Error ? e.message : String(e)), true);
  } finally { btn.disabled = false; btn.textContent = '保存并重启'; }
}

async function checkGateway() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const pill = document.getElementById('statusPill');
  try {
    const sr = await fetch('/api/status');
    const data = await sr.json();
    const hasApiKey = data.config && data.config.has_api_key;

    let gwOk = false;
    try {
      const g = await fetch('/api/gateway/health');
      const gd = await g.json();
      gwOk = gd.ok && gd.gateway && gd.gateway.status === 'live';
    } catch(e) {}

    if (gwOk) {
      dot.className = 'status-dot green';
      pill.className = 'status-pill online';
      var token = window._gatewayToken || '';
      var url = token ? 'http://localhost:3131/#token=' + encodeURIComponent(token) : 'http://localhost:3131';
      text.innerHTML = '<span>服务已就绪</span>'
        + ' <a href="' + url + '" target="_blank" class="btn-dashboard">打开控制台</a>'
        + ' <button class="btn-ghost" style="padding:4px 12px;font-size:.78em;margin-left:6px" onclick="restartGateway()">重启网关</button>';
    } else if (!hasApiKey) {
      dot.className = 'status-dot red';
      pill.className = 'status-pill offline';
      text.innerHTML = '请在下方选择一个模型并填写 API Key 后保存';
    } else {
      dot.className = 'status-dot orange';
      pill.className = 'status-pill loading-state';
      text.innerHTML = 'Gateway 正在启动… <button class="btn-primary" style="padding:4px 12px;font-size:.82em;margin-left:8px" onclick="startGateway()">点击启动</button>';
    }
  } catch(e) {
    document.getElementById('stepSetup').classList.remove('active');
    document.getElementById('stepDone').classList.remove('active');
    document.getElementById('stepNoGateway').style.display = 'block';
    dot.className = 'status-dot red';
    pill.className = 'status-pill offline';
    text.innerHTML = '配置中心连接中…';
  }
}

async function startGateway() {
  var text = document.getElementById('statusText');
  text.innerHTML = '正在启动 Gateway…';
  try {
    var r = await fetch('/api/gateway/start', {method:'POST'});
    var d = await r.json();
    if (d.ok) {
      text.innerHTML = 'Gateway 正在启动，请稍候…';
      for (var i = 0; i < 30; i++) {
        await new Promise(function(x) { setTimeout(x, 2000); });
        try {
          var g = await fetch('http://127.0.0.1:18789/health');
          if (g.ok) {
            var t2 = window._gatewayToken || '';
            var u2 = t2 ? 'http://localhost:3131/#token=' + encodeURIComponent(t2) : 'http://localhost:3131';
            document.getElementById('statusDot').className = 'status-dot green';
            document.getElementById('statusPill').className = 'status-pill online';
            text.innerHTML = '<span>服务已就绪</span>'
              + ' <a href="' + u2 + '" target="_blank" class="btn-dashboard">打开控制台</a>'
              + ' <button class="btn-ghost" style="padding:4px 12px;font-size:.78em;margin-left:6px" onclick="restartGateway()">重启网关</button>';
            return;
          }
        } catch(e2) {}
      }
      text.innerHTML = 'Gateway 启动超时，请运行: ./openclaw gateway run';
    } else {
      text.innerHTML = '启动失败: ' + (d.error || 'unknown');
    }
  } catch(e) { text.innerHTML = '请求失败，请运行: ./openclaw gateway run'; }
}

async function stopGateway() {
  var text = document.getElementById('statusText');
  var dot = document.getElementById('statusDot');
  var pill = document.getElementById('statusPill');
  try {
    var r = await fetch('/api/gateway/stop', {method:'POST'});
    var d = await r.json();
    if (d.ok) {
      dot.className = 'status-dot red';
      pill.className = 'status-pill offline';
      text.innerHTML = 'Gateway 已停止 <button class="btn-primary" style="padding:4px 12px;font-size:.82em;margin-left:8px" onclick="startGateway()">点击启动</button>';
      showToast('Gateway 已停止');
    } else { showToast('停止失败: ' + (d.error || 'unknown'), true); }
  } catch(e) { showToast('请求失败', true); }
}

async function restartGateway() {
  var text = document.getElementById('statusText');
  var dot = document.getElementById('statusDot');
  var pill = document.getElementById('statusPill');
  dot.className = 'status-dot orange';
  pill.className = 'status-pill loading-state';
  text.innerHTML = 'Gateway 重启中…';
  try {
    var r = await fetch('/api/gateway/restart', {method:'POST'});
    var d = await r.json();
    if (d.ok) {
      for (var i = 0; i < 30; i++) {
        await new Promise(function(x) { setTimeout(x, 2000); });
        try {
          var g = await fetch('http://127.0.0.1:18789/health');
          if (g.ok) {
            dot.className = 'status-dot green';
            pill.className = 'status-pill online';
            var token = window._gatewayToken || '';
            var url = token ? 'http://localhost:3131/#token=' + encodeURIComponent(token) : 'http://localhost:3131';
            text.innerHTML = '<span>服务已就绪</span>'
              + ' <a href="' + url + '" target="_blank" class="btn-dashboard">打开控制台</a>'
              + ' <button class="btn-ghost" style="padding:4px 12px;font-size:.78em;margin-left:6px" onclick="restartGateway()">重启网关</button>';
            showToast('Gateway 重启完成');
            return;
          }
        } catch(e2) {}
      }
      text.innerHTML = 'Gateway 重启超时，请运行: ./openclaw gateway run';
    } else { text.innerHTML = '重启失败: ' + (d.error || 'unknown'); }
  } catch(e) { text.innerHTML = '请求失败，请运行: ./openclaw gateway run'; }
}

function skipToChannels() { saveWithoutModel(); }
function saveWithoutModel() {
  document.getElementById('stepSetup').classList.remove('active');
  document.getElementById('stepDone').classList.add('active');
  loadChannels();
}

async function fetchLogs() {
  try {
    var r = await fetch('/api/logs');
    if(r.ok) { var t = await r.text(); document.getElementById('logViewer').textContent = t; }
  } catch(e) {}
}

function toggleLogs(e) {
  if(e.target.closest('button')) return;
  var v = document.getElementById('logViewer');
  var arrow = document.getElementById('logArrow');
  var c = v.style.display === 'none';
  v.style.display = c ? 'block' : 'none';
  arrow.textContent = c ? '▾' : '▸';
}

async function copyLogs(e) {
  e.stopPropagation();
  try {
    await navigator.clipboard.writeText(document.getElementById('logViewer').textContent);
    showToast('✅ 日志已复制');
  } catch(e2) { showToast('❌ 复制失败', true); }
}

function openVersionModal() {
  document.getElementById('versionModal').classList.add('show');
  document.getElementById('currentVersion').textContent = '检测中…';
  document.getElementById('latestVersionLine').hidden = true;
  document.getElementById('updateBtn').style.display = 'none';
  document.getElementById('updateStatus').textContent = '';
  fetch('/api/update/check').then(function(r) { return r.json(); }).then(function(d) {
    document.getElementById('currentVersion').textContent = 'v' + (d.current || '?');
    if (d.ok && d.hasUpdate) {
      document.getElementById('latestVersion').textContent = 'v' + d.latest;
      document.getElementById('latestVersionLine').hidden = false;
      document.getElementById('updateStatus').innerHTML = '<span style="color:#f59e0b">有可用更新：v' + d.latest + ' (当前 v' + d.current + ')</span>';
      document.getElementById('updateBtn').style.display = 'inline-block';
    } else if (d.ok) {
      document.getElementById('updateStatus').innerHTML = '<span style="color:#4ade80">已是最新版本 ✓</span>';
    } else {
      document.getElementById('updateStatus').innerHTML = '<span style="color:#f56565">检查更新失败: ' + (d.error || '网络错误') + '</span>';
    }
  }).catch(function() {
    document.getElementById('updateStatus').innerHTML = '<span style="color:#f56565">网络请求失败</span>';
  });
}
function doUpdate() {
  var btn = document.getElementById('updateBtn');
  var st = document.getElementById('updateStatus');
  btn.disabled = true;
  btn.textContent = '更新中…';
  st.innerHTML = '<span style="color:#f59e0b">正在下载并安装更新…</span>';
  fetch('/api/update/run', {method:'POST'}).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) {
      btn.textContent = '已完成';
      st.innerHTML = '<span style="color:#4ade80">✓ ' + d.message + '</span>';
    } else {
      btn.disabled = false;
      btn.textContent = '重试';
      st.innerHTML = '<span style="color:#f56565">更新失败: ' + (d.error || '未知错误') + '</span>';
    }
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = '重试';
    st.innerHTML = '<span style="color:#f56565">网络请求失败</span>';
  });
}
function openTerminalModal() {
  fetch('/api/terminal').then(function(r){return r.json()}).then(function(d){
    if(d.ok){
      showToast('✅ 已打开 ' + d.terminal + '，Gateway 启动中…');
      setTimeout(checkGateway, 3000);
    } else {
      showToast('❌ 未找到终端: ' + (d.error || '请手动打开'), true);
    }
  }).catch(function(){
    showToast('❌ 请求失败', true);
  });
}

async function loadConfig() {
  try {
    var r = await fetch('/api/config');
    config = await r.json();
    if(config.models && config.models.providers) {
      Object.keys(config.models.providers).forEach(function(k) {
        var p = config.models.providers[k];
        var card = document.querySelector('.feature-card[data-provider="' + k + '"]');
        if(card) {
          if(p.apiKey) card.querySelector('.inp-key').value = p.apiKey;
          if(p.baseUrl) card.querySelector('.inp-base').value = p.baseUrl;
          if(p.models && p.models[0] && p.models[0].id) card.querySelector('.inp-model').value = p.models[0].id;
          card.querySelector('.card-face h4').insertAdjacentHTML('beforeend','<span class="configured-dot">已配置</span>');
        }
      });
    }
    document.getElementById('currentVersion').textContent = (document.querySelector('.version-data') || {}).textContent || 'v2026.6.1';
  } catch(e) {}
}

function loadChannels() {
  var configuredChannels = {};
  if (config.plugins && config.plugins.entries) {
    Object.keys(config.plugins.entries).forEach(function(k) {
      if (config.plugins.entries[k].enabled) configuredChannels[k] = true;
    });
  }
  if (config.channels) {
    Object.keys(config.channels).forEach(function(k) {
      var ch = config.channels[k];
      if (ch.enabled && ch.accounts && Object.keys(ch.accounts).length > 0) configuredChannels[k] = true;
    });
  }
  document.querySelectorAll('.channel-card').forEach(function(card) {
    var ch = card.dataset.channel;
    var found = Object.keys(configuredChannels).some(function(k) { return k.includes(ch); });
    if (found) {
      card.querySelector('.card-face h4 span').insertAdjacentHTML('afterend','<span class="configured-dot" style="margin-left:auto">已配置</span>');
    }
  });
}

async function unbindChannel(channelId, btn) {
  if (!confirm('确定要解绑 ' + channelId + ' 吗？此操作会清除已保存的凭证。')) return;
  btn.disabled = true;
  btn.textContent = '解绑中…';
  try {
    var r = await fetch('/api/channels/unbind', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({channel: channelId})
    });
    var d = await r.json();
    if (d.ok) {
      showToast('✅ ' + d.message);
      btn.remove();
      var channelCard = btn.closest('.channel-card');
      var connectBtn = channelCard.querySelector('.action-btn.primary');
      if (connectBtn) { connectBtn.textContent = '扫码登录'; connectBtn.disabled = false; }
      var statusEl = channelCard.querySelector('.plugin-status');
      if (statusEl) { statusEl.innerHTML = ''; statusEl.style.display = 'none'; }
      if (connectBtn && connectBtn._pollTimer) { clearInterval(connectBtn._pollTimer); connectBtn._pollTimer = null; }
    } else {
      throw new Error(d.error || '解绑失败');
    }
  } catch(e) {
    showToast('❌ ' + (e instanceof Error ? e.message : String(e)), true);
  } finally { btn.disabled = false; btn.textContent = '换绑'; }
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function loadGatewayToken() {
  fetch('/api/auto-token').then(function(r) { return r.json(); }).then(function(d) {
    if(d.token) { window._gatewayToken = d.token; }
  }).catch(function() {});
}

// ── Theme toggle ──
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  var btn = document.getElementById('themeToggle');
  btn.textContent = next === 'dark' ? '☀' : '☾';
  try { localStorage.setItem('openclaw.starter.theme', next); } catch(e) {}
}

function loadTheme() {
  var saved;
  try { saved = localStorage.getItem('openclaw.starter.theme'); } catch(e) {}
  var theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀' : '☾';
}

renderModels();
renderChannels();
loadTheme();
loadGatewayToken();
loadConfig();
setTimeout(function() { checkGateway(); }, 500);
var gatewayInterval = setInterval(checkGateway, 5000);
logInterval = setInterval(fetchLogs, 2000);
fetchLogs();
window.addEventListener('beforeunload', function() {
  clearInterval(gatewayInterval);
  clearInterval(logInterval);
});
